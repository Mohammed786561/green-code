<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Dual Pane</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', 'Consolas', monospace;
        }
        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .pane {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .terminal {
            height: 100%;
            width: 100%;
            padding: 25px;
            overflow-y: auto;
            overflow-x: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0,255,65,0.15) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(0,255,65,0.12) 0%, transparent 30%),
                #000;
            box-shadow: inset 0 0 80px rgba(0,255,65,0.22);
            border-right: 3px solid #00aa33;
            box-sizing: border-box;
        }
        .tab-pane {
            padding: 25px;
            overflow-y: auto;
            overflow-x: hidden;
            white-space: pre-wrap;
            background: 
                radial-gradient(circle at 30% 20%, rgba(0,200,100,0.12) 0%, transparent 30%),
                radial-gradient(circle at 70% 80%, rgba(0,200,100,0.1) 0%, transparent 30%),
                #000;
            box-shadow: inset 0 0 60px rgba(0,200,100,0.18);
            box-sizing: border-box;
        }
        .prompt {
            color: #00ff41;
            text-shadow: 0 0 15px #00ff41;
            letter-spacing: 1px;
            font-weight: bold;
            font-size: 20px;
        }
        .prompt::after {
            content: '_';
            animation: blink 0.6s step-end infinite;
            margin-left: 3px;
            text-shadow: 0 0 15px #00ff41;
        }
        .output { 
            color: #00cc33; 
            margin-left: 15px;
            text-shadow: 0 0 5px #00cc33;
            font-size: 18px;
        }
        .header { 
            color: #66ff99; 
            font-weight: bold;
            text-shadow: 0 0 12px #66ff99;
            font-size: 22px;
        }
        .file { color: #99ffcc; font-weight: 600; }
        .size { color: #00ff88; font-weight: bold; }
        .time { color: #33ff77; }
        .tab-header {
            color: #00cc66;
            font-weight: bold;
            text-shadow: 0 0 10px #00cc66;
            font-size: 20px;
            margin-bottom: 15px;
        }
        .tab-output {
            color: #66ffaa;
            margin-left: 10px;
            font-size: 18px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: inset 0 0 80px rgba(0,255,65,0.22); }
            50% { box-shadow: inset 0 0 100px rgba(0,255,65,0.3); }
        }
        @keyframes glowPulse2 {
            0%, 100% { box-shadow: inset 0 0 60px rgba(0,200,100,0.18); }
            50% { box-shadow: inset 0 0 80px rgba(0,200,100,0.25); }
        }
        .terminal { animation: glowPulse 2.5s ease-in-out infinite; }
        .tab-pane { animation: glowPulse2 3s ease-in-out infinite reverse; }
    </style>
</head>
<body>
    <div class="container">
        <div class="pane">
            <div id="terminal-left" class="terminal"></div>
        </div>
        <div class="pane">
            <div id="tab-pane" class="tab-pane">
                <div id="tab-content"></div>
            </div>
        </div>
    </div>
    
    <script>
        const termLeft = document.getElementById('terminal-left');
        const tabContent = document.getElementById('tab-content');
        
        const commands = ['dir /s', 'dir *.exe', 'ls -la', 'tree /f', 'find . -name "*"', 'du -sh'];
        const prompts = ['C:\\>', 'D:\\>', 'C:\\Users>', '/home>', 'PS C:\\>', 'user@host:~$'];
        
        const tabCommands = ['netstat -an', 'tasklist', 'ps aux', 'top', 'wmic process', 'systeminfo'];
        
        function randomFile() {
            const exts = ['.txt','.exe','.dll','.sys','.log','.cfg'];
            return `file${Math.floor(Math.random()*9999)}${exts[Math.floor(Math.random()*exts.length)]}`;
        }
        
        function randomSize() { return (Math.floor(Math.random()*9999999)).toLocaleString(); }
        function randomTime() {
            const d = new Date(Date.now() - Math.random()*8640000000);
            return d.toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit'});
        }
        
        function addTerminalLine() {
            const prompt = prompts[Math.floor(Math.random()*prompts.length)];
            const cmd = commands[Math.floor(Math.random()*commands.length)];
            
            termLeft.innerHTML += `<span class="prompt">${prompt} ${cmd}</span>\n`;
            termLeft.innerHTML += `<span class="header">Directory scan...</span>\n`;
            for (let i = 0; i < 3; i++) {
                termLeft.innerHTML += `  <span class="file">${randomFile()}</span> <span class="size">${randomSize()}</span> <span class="time">${randomTime()}</span>\n`;
            }
            termLeft.innerHTML += '\n';
            termLeft.scrollTop = termLeft.scrollHeight;
        }
        
        function addTabLine() {
            const tabCmd = tabCommands[Math.floor(Math.random()*tabCommands.length)];
            tabContent.innerHTML += `<span class="tab-header">${tabCmd}</span>\n`;
            
            if (tabCmd.includes('netstat') || tabCmd.includes('tasklist')) {
                for (let i = 0; i < 4; i++) {
                    tabContent.innerHTML += `<span class="tab-output">PID: ${Math.floor(Math.random()*9999)} ${randomFile()} ${Math.floor(Math.random()*9999)} </span>\n`;
                }
            } else {
                for (let i = 0; i < 5; i++) {
                    tabContent.innerHTML += `<span class="tab-output">${randomFile()} ${randomSize()} CPU:${Math.floor(Math.random()*100)}%</span>\n`;
                }
            }
            tabContent.innerHTML += '\n';
            tabContent.scrollTop = tabContent.scrollHeight;
        }
        
        // Dual pane spam
        let leftDelay = 400, rightDelay = 600;
        function spamLeft() {
            addTerminalLine();
            leftDelay = 350 + Math.random() * 400;
            setTimeout(spamLeft, leftDelay);
        }
        function spamRight() {
            addTabLine();
            rightDelay = 500 + Math.random() * 600;
            setTimeout(spamRight, rightDelay);
        }
        
        // Initial burst
        for (let i = 0; i < 10; i++) {
            setTimeout(addTerminalLine, i * 200);
            setTimeout(addTabLine, i * 300);
        }
        
        setTimeout(spamLeft, 2500);
        setTimeout(spamRight, 3500);
    </script>
</body>
</html>
