<!DOCTYPE html>
<html>
<head>
<title>Full Terminal</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: monospace;
  overflow: hidden; /* no manual scroll */
}

#terminal {
  color: #00ff00;
  font-size: 14px;
  line-height: 1.3;
  padding: 10px;
  width: 100vw;
  height: 100vh;   /* FULL SCREEN */
  overflow: hidden;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

function line() {
  const items = [
    "C:\\System\\file_" + Math.floor(Math.random()*99999),
    "C:\\Users\\data_" + Math.floor(Math.random()*99999),
    "Scanning disk...",
    "Reading sectors...",
    "dir /s processing...",
    "Indexing system files...",
    "Memory check OK",
    "Loading kernel modules..."
  ];

  return items[Math.floor(Math.random() * items.length)];
}

function run() {
  terminal.innerHTML += line() + "\n";

  // FORCE auto bottom (no scrolling needed)
  terminal.scrollTop = terminal.scrollHeight;

  // fast infinite loop
  setTimeout(run, 5);
}

run();
</script>

</body>
</html>
