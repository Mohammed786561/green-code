<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: monospace;
  overflow: hidden;
}

#terminal {
  color: #00ff00;
  padding: 20px;
  font-size: 16px;
  white-space: pre-wrap;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

const text = [
"C:\\Users> dir /s",
"",
"Scanning system...",
"Loading files...",
"",
"C:\\Windows\\System32",
"C:\\Users\\Documents",
"C:\\Program Files",
"",
"Done.",
"C:\\Users>"
];

let i = 0;

function printLine() {
  if (i < text.length) {
    terminal.innerHTML += text[i] + "\n";
    i++;
    setTimeout(printLine, 300);
  } else {
    terminal.innerHTML += "█<span class='cursor'></span>";
  }
}

printLine();
</script>

</body>
</html>
