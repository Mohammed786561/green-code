<!DOCTYPE html>
<html>
<head>
  <title>System Monitor</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff9c;
      font-family: monospace;
      overflow: hidden;
    }

    #terminal {
      padding: 10px;
      white-space: pre-wrap;
      font-size: 14px;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script>
    const terminal = document.getElementById("terminal");

    const commands = [
      "du -sh", "ls -la", "netstat -an", "tasklist",
      "ping 10.0.0.1", "tracert example.com",
      "cat /var/log/syslog", "whoami", "ipconfig",
      "dir *.exe", "ps aux", "top"
    ];

    const words = ["file", "sys", "log", "data", "core", "tmp", "bin", "cfg"];

    function randomLine() {
      let cmd = commands[Math.floor(Math.random() * commands.length)];
      let output = `user@system:~$ ${cmd}\n`;

      let lines = Math.floor(Math.random() * 6) + 4;

      for (let i = 0; i < lines; i++) {
        let name = words[Math.floor(Math.random() * words.length)];
        let ext = words[Math.floor(Math.random() * words.length)];
        let size = Math.floor(Math.random() * 9000000) + 1000;
        let cpu = Math.floor(Math.random() * 100);

        output += `${name}${Math.floor(Math.random()*999)}.${ext} ${size} CPU:${cpu}%\n`;
      }

      return output;
    }

    function addLine() {
      terminal.textContent += randomLine();

      window.scrollTo(0, document.body.scrollHeight);

      if (terminal.textContent.length > 20000) {
        terminal.textContent = terminal.textContent.slice(-10000);
      }
    }

    setInterval(addLine, 50);
  </script>
</body>
</html>
