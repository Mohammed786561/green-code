<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', 'Consolas', monospace;
        }
        body {
            font-size: 20px;  /* BIGGER FONT FOR CHROMEBOOK */
            line-height: 1.2;
            padding: 20px;
        }
        #terminal {
            width: 100vw;
            height: 100vh;
            padding: 25px;
            overflow-y: auto;
            overflow-x: hidden;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0,255,65,0.15) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(0,255,65,0.12) 0%, transparent 30%),
                #000;
            box-shadow: inset 0 0 80px rgba(0,255,65,0.22);
            border: 3px solid #00aa33;
            box-sizing: border-box;
            position: relative;
        }
        .prompt {
            color: #00ff41;
            text-shadow: 0 0 15px #00ff41;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .prompt::after {
            content: '_';
            animation: blink 0.6s step-end infinite;
            margin-left: 3px;
            text-shadow: 0 0 15px #00ff41;
        }
        .output { 
            color: #00cc33; 
            margin-left: 15px;
            text-shadow: 0 0 5px #00cc33;
        }
        .header { 
            color: #66ff99; 
            font-weight: bold;
            text-shadow: 0 0 12px #66ff99;
            font-size: 22px;
        }
        .file { 
            color: #99ffcc; 
            font-weight: 600;
        }
        .size { 
            color: #00ff88; 
            font-weight: bold;
        }
        .time { 
            color: #33ff77; 
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        @keyframes glowPulse {
            0%, 100% { 
                box-shadow: inset 0 0 80px rgba(0,255,65,0.22),
                            0 0 40px rgba(0,255,65,0.3);
            }
            50% { 
                box-shadow: inset 0 0 100px rgba(0,255,65,0.3),
                            0 0 60px rgba(0,255,65,0.5);
            }
        }
        #terminal {
            animation: glowPulse 2.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    
    <script>
        const terminal = document.getElementById('terminal');
        const commands = [
            'dir /s', 'dir *.exe', 'dir /s /b', 'dir /a',
            'ls -la', 'ls -R', 'ls *.log -lh',
            'tree /f', 'tree -d -L 2',
            'find . -name "*.txt"', 'findstr /s "*.exe"',
            'du -sh *', 'dirsize'
        ];
        const prompts = [
            'C:\\>', 'D:\\>', 'C:\\Users>', 'C:\\Windows\\System32>',
            '/home>', '/var>', '/tmp>', '/usr/bin>',
            'PS C:\\Users>', 'PS D:\\>', 'user@chromebook:~$'
        ];

        function randomFile() {
            const exts = ['.txt','.log','.exe','.dll','.sys','.cfg','.ini','.tmp','.bak','.dat'];
            const names = ['file','sys','log','cfg','tmp','data','doc','cache','temp','backup'];
            return `${names[Math.floor(Math.random()*names.length)]}${Math.floor(Math.random()*9999)}${exts[Math.floor(Math.random()*exts.length)]}`;
        }

        function randomSize() {
            return (Math.floor(Math.random()*99999999)).toLocaleString();
        }

        function randomTime() {
            const d = new Date(Date.now() - Math.random()*8640000000);
            return d.toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        }

        function generateOutput(cmd) {
            let output = '';
            
            if (cmd.includes('dir') || cmd.includes('ls')) {
                output += `<span class="header">Directory listing</span>\n`;
                const files = 4 + Math.floor(Math.random()*7);
                for (let i = 0; i < files; i++) {
                    output += `  <span class="file">${randomFile()}</span> <span class="size">${randomSize()}</span> <span class="time">${randomTime()}</span>\n`;
                }
                output += `<span class="output">Total ${files} items</span>\n\n`;
            } else if (cmd.includes('tree')) {
                output += `<span class="header">TREE structure</span>\n`;
                output += `📁 ${Math.random().toString(36).substr(2,6).toUpperCase()}\n`;
                output += `  📄 ${randomFile()}\n`;
                output += `  📁 subfolder\n`;
                output += `    📄 ${randomFile()}\n`;
            } else {
                for (let i = 0; i < 5; i++) {
                    output += `<span class="output">${randomFile()} ${randomSize()}</span>\n`;
                }
            }
            
            return output;
        }

        function addLine() {
            const prompt = prompts[Math.floor(Math.random()*prompts.length)];
            const cmd = commands[Math.floor(Math.random()*commands.length)];
            
            terminal.innerHTML += `<span class="prompt">${prompt} ${cmd}</span>\n`;
            terminal.innerHTML += generateOutput(cmd);
            
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Chromebook optimized timing
        let delay = 350;
        function spamLoop() {
            addLine();
            delay = 280 + Math.random() * 450;
            setTimeout(spamLoop, delay);
        }

        // Fast start burst for Chromebook
        for (let i = 0; i < 15; i++) {
            setTimeout(addLine, i * 150);
        }
        setTimeout(spamLoop, 2800);
    </script>
</body>
</html>
