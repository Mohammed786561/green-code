<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            height: 100vh;
            overflow: hidden;
        }
        #terminal {
            height: 100vh;
            padding: 25px;
            overflow-y: auto;
            white-space: pre-wrap;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0,255,65,0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0,255,65,0.08) 0%, transparent 40%),
                #000;
            box-shadow: inset 0 0 40px rgba(0,255,65,0.15);
            border: 1px solid #00aa33;
            position: relative;
        }
        .prompt {
            color: #00ff41;
            text-shadow: 0 0 8px #00ff41;
            animation: cursor 1s step-end infinite;
        }
        .output { color: #00cc33; margin-left: 6px; }
        .header { color: #66ff99; font-weight: bold; }
        .file { color: #99ffcc; }
        .size { color: #00ff88; }
        .time { color: #33ff77; }
        @keyframes cursor {
            0%, 50% { border-right: 2px solid #00ff41; }
            51%, 100% { border-right: none; }
        }
        .prompt::after {
            content: '_';
            animation: cursor 0.8s step-end infinite;
            margin-left: 2px;
        }
        @keyframes scan {
            0% { box-shadow: inset 0 0 40px rgba(0,255,65,0.2); }
            50% { box-shadow: inset 0 0 60px rgba(0,255,65,0.3); }
            100% { box-shadow: inset 0 0 40px rgba(0,255,65,0.2); }
        }
        #terminal { animation: scan 4s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    
    <script>
        const terminal = document.getElementById('terminal');
        const commands = [
            'dir /s',
            'ls -la',
            'tree /f',
            'find . -name "*.txt"',
            'dir *.exe /s',
            'ls -R',
            'du -sh *'
        ];
        const prompts = [
            'C:\\>', 'D:\\data>', 'C:\\Users\\Docs>', 'C:\\Windows\\Sys>', 
            '/home/>', '/var/log>', 'user@host:~$', 'root@server:~#',
            'PS C:\\>', 'bash-5.1$'
        ];

        function randomFile() {
            const exts = ['.txt','.log','.bak','.tmp','.dat','.cfg','.ini','.exe','.dll','.jpg'];
            const names = ['doc','log','cfg','tmp','bak','data','file','sys','cache','temp'];
            return `${names[Math.floor(Math.random()*names.length)]}${Math.floor(Math.random()*9999)}${exts[Math.floor(Math.random()*exts.length)]}`;
        }

        function randomSize() {
            return (Math.floor(Math.random()*99999999)).toLocaleString();
        }

        function randomTime() {
            const d = new Date(Date.now() - Math.random()*31536000000);
            return d.toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        }

        function generateOutput(cmd) {
            let output = '';
            
            if (cmd.includes('dir') || cmd.includes('ls')) {
                output += `<span class="header">Directory of .</span>\n`;
                for (let i = 0; i < 4 + Math.floor(Math.random()*6); i++) {
                    output += `  <span class="file">${randomFile().padEnd(28)}</span><span class="size">${randomSize().padEnd(12)}</span><span class="time">${randomTime()}</span>\n`;
                }
                output += `<span class="output">${Math.floor(Math.random()*30)} files</span>\n\n`;
            } else if (cmd.includes('tree')) {
                output += `<span class="header">Folder PATH listing</span>\n`;
                for (let i = 0; i < 3; i++) {
                    output += `  ${'│   '.repeat(Math.floor(Math.random()*3))}${Math.random().toString(36).substr(2,8)}\n`;
                }
            } else if (cmd.includes('find') || cmd.includes('du')) {
                for (let i = 0; i < 5; i++) {
                    output += `<span class="output">./${randomFile()} ${randomSize()}</span>\n`;
                }
            }
            
            return output;
        }

        function spamTerminal() {
            const prompt = prompts[Math.floor(Math.random()*prompts.length)];
            const cmd = commands[Math.floor(Math.random()*commands.length)];
            
            terminal.innerHTML += `<span class="prompt">${prompt} ${cmd}</span>\n`;
            terminal.innerHTML += generateOutput(cmd);
            
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Varied spam timing for realism
        function startSpam() {
            spamTerminal();
            const nextDelay = 300 + Math.random() * 800;
            setTimeout(startSpam, nextDelay);
        }

        // Initial burst
        for (let i = 0; i < 8; i++) {
            setTimeout(spamTerminal, i * 250);
        }
        
        // Start continuous varied spam
        setTimeout(startSpam, 2000);
    </script>
</body>
</html>
