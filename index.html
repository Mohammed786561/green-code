<!DOCTYPE html>
<html>
<head>
<title>Dashboard Terminal</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
  font-family: monospace;
  overflow: hidden;
  color: #00ff00;
}

/* TOP TABS */
#tabs {
  display: flex;
  background: #0a0a0a;
  border-bottom: 1px solid #00ff00;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  border-right: 1px solid #003300;
}

.tab:hover {
  background: #003300;
}

/* MAIN LAYOUT */
#main {
  display: flex;
  height: calc(100vh - 40px);
}

/* LEFT COLUMN */
#left {
  width: 30%;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #003300;
}

/* PROFILE BOX */
#profile {
  height: 25%;
  border-bottom: 1px solid #003300;
  padding: 10px;
}

.avatar {
  font-size: 40px;
  margin-top: 10px;
}

/* TERMINAL BOX */
#terminal {
  height: 75%;
  padding: 10px;
  overflow: hidden;
  white-space: pre-wrap;
  font-size: 13px;
}

/* MIDDLE */
#middle {
  width: 35%;
  border-right: 1px solid #003300;
  padding: 10px;
}

/* RIGHT */
#right {
  width: 35%;
  padding: 10px;
}

/* BOX STYLE */
.box {
  border: 1px solid #003300;
  padding: 10px;
  margin-bottom: 10px;
  height: 100%;
  overflow: hidden;
}
</style>
</head>

<body>

<!-- TOP TABS -->
<div id="tabs">
  <div class="tab">Dashboard</div>
  <div class="tab">System</div>
  <div class="tab">Logs</div>
</div>

<!-- MAIN AREA -->
<div id="main">

  <!-- LEFT -->
  <div id="left">

    <div id="profile" class="box">
      👤 PROFILE
      <div class="avatar">❓</div>
      <div>Status: ACTIVE</div>
    </div>

    <div id="terminal" class="box"></div>

  </div>

  <!-- MIDDLE -->
  <div id="middle">
    <div class="box" id="stats">
      📊 SYSTEM STATS<br><br>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div class="box" id="logs">
      ⚙️ LIVE ACTIVITY<br><br>
    </div>
  </div>

</div>

<script>
// TERMINAL (LEFT BOTTOM)
const terminal = document.getElementById("terminal");

function termLine() {
  const items = [
    "C:\\System\\file_" + Math.floor(Math.random()*99999),
    "dir /s scanning...",
    "Loading modules...",
    "Indexing files...",
    "Memory check OK",
    "Kernel running..."
  ];
  return items[Math.floor(Math.random()*items.length)];
}

function runTerminal() {
  terminal.innerHTML += termLine() + "\n";
  terminal.scrollTop = terminal.scrollHeight;
  setTimeout(runTerminal, 20);
}

runTerminal();


// MIDDLE STATS
const stats = document.getElementById("stats");

function updateStats() {
  stats.innerHTML = `
📊 SYSTEM STATS<br><br>
CPU: ${Math.floor(Math.random()*100)}%<br>
RAM: ${Math.floor(Math.random()*100)}%<br>
GPU: ${Math.floor(Math.random()*100)}%<br>
NETWORK: ${Math.floor(Math.random()*1000)} Mbps<br>
STATUS: STABLE
`;
}

setInterval(updateStats, 500);


// RIGHT LOGS
const logs = document.getElementById("logs");

function logLine() {
  const msgs = [
    "User activity detected",
    "Background process running",
    "Syncing data...",
    "No threats found",
    "System optimized"
  ];

  logs.innerHTML += msgs[Math.floor(Math.random()*msgs.length)] + "<br>";
  logs.scrollTop = logs.scrollHeight;
}

setInterval(logLine, 800);

</script>

</body>
</html>
