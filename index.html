<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dir /s</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: lime;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.3;
            overflow: hidden;
            height: 100vh;
        }
        #terminal {
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
            white-space: pre-wrap;
            animation: scroll-down 0.1s linear infinite;
        }
        .prompt {
            color: #00ff00;
            animation: blink 0.6s infinite;
        }
        .output {
            color: #00aa00;
            margin-left: 10px;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.4; }
        }
        @keyframes scroll-down {
            0% { transform: translateY(0); }
            100% { transform: translateY(-1px); }
        }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script>
        const terminal = document.getElementById('terminal');
        let lineCount = 0;

        function generateDirLine() {
            const files = [
                'file' + Math.floor(Math.random() * 10000) + '.txt',
                'document' + Math.floor(Math.random() * 1000) + '.doc',
                'backup' + Math.floor(Math.random() * 500) + '.bak',
                'config' + Math.floor(Math.random() * 100) + '.ini',
                'data' + Math.floor(Math.random() * 999) + '.dat'
            ];
            
            const size = Math.floor(Math.random() * 9999999);
            const date = new Date(Date.now() - Math.random() * 1000000000)
                .toLocaleString('en-US', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
            
            return `${files[Math.floor(Math.random() * files.length)]} ${size.toLocaleString()} ${date}`;
        }

        function addDirSpam() {
            // Prompt
            terminal.innerHTML += `<span class="prompt">C:\\> dir /s</span>\n`;
            
            // Directory header
            terminal.innerHTML += `<span class="output">Directory of C:\\${Math.random().toString(36).substr(2, 4)}</span>\n`;
            
            // Multiple file lines
            for (let i = 0; i < 5 + Math.floor(Math.random() * 8); i++) {
                terminal.innerHTML += `<span class="output">  ${generateDirLine()}</span>\n`;
            }
            
            // More prompts
            for (let i = 0; i < 2 + Math.floor(Math.random() * 3); i++) {
                terminal.innerHTML += `<span class="prompt">C:\\> dir /s</span>\n`;
            }
            
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Continuous spam - never stops
        setInterval(addDirSpam, 150);
        
        // Initial burst for instant effect
        for (let i = 0; i < 10; i++) {
            setTimeout(addDirSpam, i * 100);
        }
    </script>
</body>
</html>
