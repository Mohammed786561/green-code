<div id="infiniteSpam" style="color: lime; font-family: 'Courier New', monospace; white-space: pre; animation: glitch 0.1s infinite;">

<script>
const symbols = "01{}[]()+-*/=<>!&|~^%$#@abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const commands = ["nmap -sS", "hydra -l admin", "msfconsole", "aircrack-ng", "sqlmap -u", "nikto -h", "dirb http://", "john --wordlist", "hashcat -m 0"];

function generateLine() {
    const rand = Math.random();
    if (rand < 0.1) {
        return `${commands[Math.floor(Math.random()*commands.length)]} ${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}`;
    } else if (rand < 0.2) {
        return `[*] ${["SUCCESS", "FOUND", "EXPLOITED", "ROOT", "HACKED"][Math.floor(Math.random()*5)]}: ${Math.floor(Math.random()*100)}%`;
    } else if (rand < 0.3) {
        return `def hack${Math.floor(Math.random()*10000)}(): `;
    } else if (rand < 0.4) {
        return `0x${Math.floor(Math.random()*0xFFFFFFFF).toString(16).toUpperCase()}`;
    } else {
        return Array.from({length: 40 + Math.floor(Math.random()*40)}, () => symbols[Math.floor(Math.random()*symbols.length)]).join('') + ` #${Math.floor(Math.random()*256).toString(16).padStart(2,'0')}`;
    }
}

let spamCounter = 0;
function spamCode() {
    const spamDiv = document.getElementById('infiniteSpam');
    const lines = [];
    
    // Spam 5-15 lines at once
    for (let i = 0; i < 5 + Math.floor(Math.random()*11); i++) {
        lines.push(generateLine());
    }
    
    spamDiv.innerHTML += lines.join('\n') + '\n';
    spamDiv.scrollTop = spamDiv.scrollHeight;
    
    spamCounter++;
    if (spamCounter % 50 === 0) {
        spamDiv.innerHTML += `█▓▒░ MATRIX BREACH: ${spamCounter} LINES SPAMMED ░▒▓█\n`;
    }
}

// Ultra-fast spam (never stops)
const spamInterval = setInterval(spamCode, 30);

// Additional background spam threads
setInterval(() => {
    const spamDiv = document.getElementById('infiniteSpam');
    spamDiv.innerHTML += Array.from({length: 3}, () => 
        '█▓▒░HACK_STREAM_ACTIVE░▒▓█ T=' + (performance.now()/1000).toFixed(1) + '\n'
    ).join('');
    spamDiv.scrollTop = spamDiv.scrollHeight;
}, 100);

setInterval(() => {
    const spamDiv = document.getElementById('infiniteSpam');
    spamDiv.innerHTML += `[${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}] -> OWNED\n`;
    spamDiv.scrollTop = spamDiv.scrollHeight;
}, 200);

// Matrix rain effect overlay
setInterval(() => {
    const spamDiv = document.getElementById('infiniteSpam');
    const rain = Array.from({length: 20}, () => 
        Array.from({length: 8}, () => Math.random() > 0.5 ? '1' : '0').join('')
    ).join(' ');
    spamDiv.innerHTML += `BINARY_RAIN: ${rain}\n`;
    spamDiv.scrollTop = spamDiv.scrollHeight;
}, 500);

console.log("🚀 INFINITE GREEN CODE SPAM ACTIVATED - WILL NEVER STOP 🚀");
console.log("💚 Refresh page to stop (but it will restart on reload) 💚");

</script>
