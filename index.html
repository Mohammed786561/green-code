<!DOCTYPE html>
<html>
<head>
<title>System Grid Terminal</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: monospace;
  color: #00ff00;
  overflow: hidden;
}

/* TOP BAR */
#top {
  height: 40px;
  display: flex;
  border-bottom: 1px solid #003300;
}

.tab {
  padding: 10px 20px;
  border-right: 1px solid #003300;
}

/* MAIN GRID */
#main {
  display: flex;
  height: calc(100vh - 40px);
}

/* ALL BOXES SAME SIZE */
.box {
  flex: 1;
  border-right: 1px solid #003300;
  padding: 10px;
  overflow: hidden;
  white-space: pre-wrap;
  font-size: 13px;
}

/* PROFILE AVATAR (proper circle with dots) */
.avatar {
  width: 60px;
  height: 60px;
  border: 2px dotted #00ff00;
  border-radius: 50%;
  margin-top: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="top">
  <div class="tab">SYSTEM</div>
  <div class="tab">NETWORK</div>
  <div class="tab">LOGS</div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT BOX -->
  <div class="box" id="left">
👤 USER PROFILE
<div class="avatar">?</div>
STATUS: ACTIVE

---
  </div>

  <!-- MIDDLE BOX -->
  <div class="box" id="middle"></div>

  <!-- RIGHT BOX -->
  <div class="box" id="right"></div>

</div>

<script>

// 3 independent terminal streams
const left = document.getElementById("left");
const middle = document.getElementById("middle");
const right = document.getElementById("right");

function randFile() {
  const items = [
    "C:\\System\\file_" + Math.floor(Math.random()*99999),
    "dir /s scanning...",
    "Loading kernel...",
    "Indexing drive...",
    "Memory OK",
    "System check passed"
  ];
  return items[Math.floor(Math.random()*items.length)];
}

// LEFT STREAM
function runLeft() {
  left.innerHTML += randFile() + "\n";
  setTimeout(runLeft, 30);
}

// MIDDLE STREAM (different style)
function runMiddle() {
  middle.innerHTML += "[SYS] " + randFile() + "\n";
  setTimeout(runMiddle, 50);
}

// RIGHT STREAM (logs style)
function runRight() {
  const logs = [
    "LOG >> process running",
    "LOG >> syncing data",
    "LOG >> no errors found",
    "LOG >> background task active",
    "LOG >> scan complete"
  ];

  right.innerHTML += logs[Math.floor(Math.random()*logs.length)] + "\n";
  setTimeout(runRight, 80);
}

runLeft();
runMiddle();
runRight();

</script>

</body>
</html>
