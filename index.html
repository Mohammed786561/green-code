<!DOCTYPE html>
<html>
<head>
<title>Terminal</title>
<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: monospace;
  overflow: hidden;
}

#terminal {
  color: #00ff00;
  padding: 20px;
  font-size: 16px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

function generateLine() {
  const fakePaths = [
    "C:\\Windows\\System32\\file_" + Math.floor(Math.random()*9999),
    "C:\\Users\\User\\Documents\\log_" + Math.floor(Math.random()*9999),
    "C:\\Program Files\\app_" + Math.floor(Math.random()*9999),
    "Scanning...",
    "Indexing files...",
    "dir /s running..."
  ];

  return fakePaths[Math.floor(Math.random() * fakePaths.length)];
}

function spamTerminal() {
  terminal.innerHTML += generateLine() + "\n";

  // auto scroll effect (feels alive)
  window.scrollTo(0, document.body.scrollHeight);

  // VERY FAST loop
  setTimeout(spamTerminal, 10);
}

spamTerminal();
</script>

</body>
</html>
